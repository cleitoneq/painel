<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TaskADI">
<meta name="description" content="TaskADI — Gestão de tarefas e visitas">
<title>TaskADI</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a1628;
  --bg2: #0f1e38;
  --bg3: #162340;
  --surface: #1a2a4a;
  --surface2: #1f3155;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #e8edf8;
  --text2: #8fa3c8;
  --text3: #4d6490;
  --blue: #4d9ef7;
  --blue-bg: rgba(77,158,247,0.15);
  --green: #22c98e;
  --green-bg: rgba(34,201,142,0.12);
  --red: #f0605a;
  --red-bg: rgba(240,96,90,0.12);
  --amber: #f5a623;
  --amber-bg: rgba(245,166,35,0.12);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.12);
  --gray-bg: rgba(139,147,176,0.1);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto}

.topbar{
  position:sticky;top:0;z-index:50;
  padding:calc(var(--safe-top) + 14px) 20px 14px;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1565c0,#1e88e5);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:18px;height:18px}
.brand-name{font-size:19px;font-weight:600;letter-spacing:-0.4px;color:var(--text)}
.brand-name span{color:var(--blue)}
.date-label{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.notif-btn{width:34px;height:34px;border-radius:9px;background:var(--surface);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.add-fab{width:38px;height:38px;border-radius:10px;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700;transition:transform 0.15s,opacity 0.15s;flex-shrink:0}
.add-fab:active{transform:scale(0.92)}

/* Alert banner */
.alert-banner{display:none;margin:12px 20px 0;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:500;align-items:center;gap:8px}
.alert-banner.show{display:flex}
.alert-banner.critical{background:rgba(240,96,90,0.2);border:1px solid rgba(240,96,90,0.4);color:#f8a09d}
.alert-banner.warning{background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.35);color:#f5c96a}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 20px}
.stat{background:var(--surface);border-radius:12px;padding:10px 6px;text-align:center;border:1px solid var(--border)}
.stat-n{font-size:21px;font-weight:600;font-family:var(--mono);line-height:1}
.stat-l{font-size:10px;color:var(--text3);margin-top:3px}
.stat.red .stat-n{color:var(--red)}
.stat.green .stat-n{color:var(--green)}
.stat.amber .stat-n{color:var(--amber)}

.filters{display:flex;gap:6px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.chip.active{background:var(--blue);border-color:transparent;color:#fff}
.chip:active{transform:scale(0.95)}

.list{flex:1;overflow-y:auto;padding:0 20px calc(var(--safe-bottom) + 80px);display:flex;flex-direction:column;gap:8px}
.section-sep{font-size:10px;color:var(--text3);letter-spacing:0.08em;font-family:var(--mono);padding:12px 0 4px;text-transform:uppercase}

/* CRITICIDADE VISUAL */
.card{
  border-radius:16px;padding:14px 16px;
  display:flex;gap:12px;align-items:flex-start;
  position:relative;overflow:hidden;
  transition:transform 0.1s;
  border:1px solid var(--border);
  background:var(--surface);
}
.card:active{transform:scale(0.99)}
.card.done{opacity:0.4;background:var(--surface)}

/* 1 dia atrasado — amarelo suave */
.card.late-1{
  background:linear-gradient(135deg, #1a2a10 0%, #2a3a15 100%);
  border-color:rgba(245,166,35,0.3);
}
/* 2-3 dias — âmbar */
.card.late-2{
  background:linear-gradient(135deg, #2a2010 0%, #3a2e12 100%);
  border-color:rgba(245,166,35,0.55);
}
/* 4-6 dias — laranja */
.card.late-3{
  background:linear-gradient(135deg, #2e1a0a 0%, #3d2210 100%);
  border-color:rgba(240,120,50,0.65);
}
/* 7+ dias — vermelho intenso */
.card.late-4{
  background:linear-gradient(135deg, #2e0d0d 0%, #3d1212 100%);
  border-color:rgba(240,96,90,0.75);
  box-shadow:0 0 0 1px rgba(240,96,90,0.2);
}
/* hoje */
.card.duetoday{
  background:linear-gradient(135deg, #0d2420 0%, #102e28 100%);
  border-color:rgba(34,201,142,0.4);
}

/* indicador lateral de criticidade */
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.card.late-1::before{background:#d4a017}
.card.late-2::before{background:#f5a623}
.card.late-3::before{background:#f07830}
.card.late-4::before{background:var(--red)}
.card.duetoday::before{background:var(--green)}

/* pulsação sutil para crítico */
@keyframes pulse-border{0%,100%{opacity:1}50%{opacity:0.5}}
.card.late-4{animation:pulse-border 2.5s ease-in-out infinite}

.check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:transparent}
.check.on{background:var(--green);border-color:var(--green);color:#0a1628;font-size:12px}

.card-body{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.4}
.card.done .card-title{text-decoration:line-through;color:var(--text3)}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}

.tag{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:500}
.tag.cliente{background:var(--blue-bg);color:var(--blue)}
.tag.visita{background:var(--purple-bg);color:var(--purple)}
.tag.teste{background:var(--amber-bg);color:var(--amber)}
.tag.admin{background:var(--gray-bg);color:var(--text2)}
.tag.urgente{background:var(--red-bg);color:var(--red)}

.due{font-size:11px;font-family:var(--mono);color:var(--text3)}
.due.overdue{color:var(--amber);font-weight:500}
.due.critical{color:var(--red);font-weight:500}
.due.today{color:var(--green);font-weight:500}
.card-client{font-size:11px;color:var(--text3)}
.card-notes{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5}

/* Ações — sempre visíveis e com contraste */
.card-actions{display:flex;flex-direction:column;gap:6px}
.icon-btn{
  width:30px;height:30px;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all 0.15s;
}
.edit-btn{color:#7eb8f7}
.edit-btn:hover,.edit-btn:active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.del-btn{color:#f78080}
.del-btn:hover,.del-btn:active{background:var(--red-bg);border-color:var(--red);color:var(--red)}

.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;line-height:2.2}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;border:1px solid var(--border2);padding:8px 24px calc(var(--safe-bottom) + 28px);width:100%;max-height:88vh;overflow-y:auto;transform:translateY(40px);transition:transform 0.25s cubic-bezier(0.34,1.36,0.64,1)}
.modal-bg.open .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:20px;letter-spacing:-0.3px}

.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;font-family:var(--mono)}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);font-family:var(--font);outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{height:72px;resize:none}
.fg select option{background:var(--bg2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.modal-footer{display:flex;gap:10px;margin-top:8px}
.btn-cancel{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:13px;font-size:14px;font-family:var(--font);color:var(--text2);cursor:pointer}
.btn-save{flex:2;background:var(--blue);border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;font-family:var(--font);color:#fff;cursor:pointer;transition:opacity 0.15s}
.btn-save:active{opacity:0.85}

/* Toast de notificação */
.toast{position:fixed;top:calc(var(--safe-top) + 16px);left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text);z-index:300;transition:transform 0.3s cubic-bezier(0.34,1.36,0.64,1);white-space:nowrap;max-width:calc(100vw - 40px);text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 11l3 3L22 4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Task<span>ADI</span></div>
        <div class="date-label" id="date-lbl"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="notif-btn" onclick="requestNotif()" title="Ativar lembretes">🔔</button>
      <button class="add-fab" onclick="openModal()" aria-label="Nova tarefa">+</button>
    </div>
  </div>
</div>

<div class="alert-banner" id="alert-banner"></div>

<div class="stats">
  <div class="stat red"><div class="stat-n" id="s-over">0</div><div class="stat-l">Atrasadas</div></div>
  <div class="stat amber"><div class="stat-n" id="s-tod">0</div><div class="stat-l">Hoje</div></div>
  <div class="stat"><div class="stat-n" id="s-pen">0</div><div class="stat-l">Pendentes</div></div>
  <div class="stat green"><div class="stat-n" id="s-done">0</div><div class="stat-l">Feitas</div></div>
</div>

<div class="filters" id="filters">
  <button class="chip active" data-f="todas">Todas</button>
  <button class="chip" data-f="atrasadas">Atrasadas</button>
  <button class="chip" data-f="hoje">Hoje</button>
  <button class="chip" data-f="cliente">Clientes</button>
  <button class="chip" data-f="visita">Visitas</button>
  <button class="chip" data-f="teste">Testes</button>
  <button class="chip" data-f="admin">Admin</button>
</div>

<div class="list" id="list"></div>

<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-ttl">Nova tarefa</div>
    <div class="fg"><label>Título</label><input type="text" id="f-title" placeholder="Ex: Visita Confecções Müller"></div>
    <div class="fg"><label>Notas</label><textarea id="f-notes" placeholder="Endereço, contato, detalhes..."></textarea></div>
    <div class="form-row">
      <div class="fg"><label>Categoria</label>
        <select id="f-cat">
          <option value="cliente">Cliente</option>
          <option value="visita">Visita</option>
          <option value="teste">Teste</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="fg"><label>Prioridade</label>
        <select id="f-pri">
          <option value="normal">Normal</option>
          <option value="urgente">Urgente</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Data</label><input type="date" id="f-date"></div>
      <div class="fg"><label>Empresa / cliente</label><input type="text" id="f-client" placeholder="Nome"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveTask()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='taskadi_v1';
let tasks=[], editId=null, filter='todas';

function load(){
  try{ tasks=JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ tasks=[]; }
  if(!tasks.length) seed();
}
function save(){ localStorage.setItem(KEY,JSON.stringify(tasks)); }

function seed(){
  const f=(d)=>{const x=new Date();x.setDate(x.getDate()+d);return x.toISOString().split('T')[0];};
  tasks=[
    {id:1,title:'Teste de estampa — Bruggolite FF6M',notes:'Verificar fixação e lavagem após 3 ciclos',cat:'teste',pri:'urgente',date:f(-7),client:'Têxtil Sul',done:false},
    {id:2,title:'Visita Confecções Müller',notes:'Apresentar nova linha de descarga',cat:'visita',pri:'normal',date:f(-3),client:'C. Müller',done:false},
    {id:3,title:'Retorno proposta comercial',notes:'',cat:'cliente',pri:'normal',date:f(-1),client:'Malharia Penha',done:false},
    {id:4,title:'Enviar laudo técnico',notes:'',cat:'admin',pri:'normal',date:f(0),client:'',done:false},
    {id:5,title:'Visita fábrica — impressão direta',notes:'',cat:'visita',pri:'normal',date:f(3),client:'Indústria ABC',done:false},
  ];
  save();
}

function today(){ return new Date().toISOString().split('T')[0]; }

function daysLate(date){
  if(!date) return 0;
  const t=new Date(today()+'T12:00:00');
  const d=new Date(date+'T12:00:00');
  return Math.floor((t-d)/(1000*60*60*24));
}

function dstatus(date){
  if(!date) return 'none';
  const dl=daysLate(date);
  if(dl>0) return 'overdue';
  if(dl===0) return 'today';
  return 'future';
}

function lateClass(date,done){
  if(done||!date) return '';
  const dl=daysLate(date);
  if(dl<=0) return dl===0?'duetoday':'';
  if(dl===1) return 'late-1';
  if(dl<=3) return 'late-2';
  if(dl<=6) return 'late-3';
  return 'late-4';
}

function fmtDate(date){
  if(!date) return '';
  if(date===today()) return 'Hoje';
  const [y,m,d]=date.split('-');
  return `${d}/${m}`;
}

function dueCls(date,done){
  if(done||!date) return 'due';
  const dl=daysLate(date);
  if(dl>=7) return 'due critical';
  if(dl>0) return 'due overdue';
  if(dl===0) return 'due today';
  return 'due';
}

function dueLabel(date,done){
  if(!date) return '';
  const dl=daysLate(date);
  if(!done&&dl>0) return `${fmtDate(date)} · ${dl}d atraso`;
  if(!done&&dl===0) return 'Hoje';
  return fmtDate(date);
}

function render(){
  let over=0,tod=0,pen=0,dn=0,maxLate=0;
  tasks.forEach(x=>{
    if(x.done){dn++;return;}
    pen++;
    const dl=daysLate(x.date);
    if(dl>0){over++;if(dl>maxLate)maxLate=dl;}
    if(dl===0) tod++;
  });
  document.getElementById('s-over').textContent=over;
  document.getElementById('s-tod').textContent=tod;
  document.getElementById('s-pen').textContent=pen;
  document.getElementById('s-done').textContent=dn;

  const d=new Date();
  document.getElementById('date-lbl').textContent=
    d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});

  // Alert banner
  const banner=document.getElementById('alert-banner');
  if(over>0){
    banner.className='alert-banner show '+(maxLate>=7?'critical':'warning');
    const icon=maxLate>=7?'🔴':'🟡';
    banner.innerHTML=`${icon} <strong>${over} tarefa${over>1?'s':''} atrasada${over>1?'s':''}</strong>${maxLate>=7?' — situação crítica!':' — requer atenção'}`;
  } else {
    banner.className='alert-banner';
  }

  let list=[...tasks];
  if(filter==='atrasadas') list=list.filter(x=>!x.done&&daysLate(x.date)>0);
  else if(filter==='hoje') list=list.filter(x=>!x.done&&dstatus(x.date)==='today');
  else if(['cliente','visita','teste','admin'].includes(filter)) list=list.filter(x=>x.cat===filter);

  list.sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    const da=daysLate(a.date), db=daysLate(b.date);
    if(da>0&&db<=0) return -1;
    if(db>0&&da<=0) return 1;
    if(da>0&&db>0) return db-da;
    if(a.pri==='urgente'&&b.pri!=='urgente') return -1;
    if(b.pri==='urgente'&&a.pri!=='urgente') return 1;
    if(a.date&&b.date) return a.date.localeCompare(b.date);
    return 0;
  });

  const el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty">Nenhuma tarefa aqui.<br>Toque em + para adicionar.</div>';return;}

  let html='',shownDone=false;
  list.forEach(x=>{
    if(x.done&&!shownDone){html+='<div class="section-sep">Concluídas</div>';shownDone=true;}
    const lc=lateClass(x.date,x.done);
    const dc=dueCls(x.date,x.done);
    const dl=dueLabel(x.date,x.done);
    const dateHtml=x.date?`<span class="${dc}">${dl}</span>`:'';
    const cli=x.client?`<span class="card-client">${x.client}</span>`:'';
    const pri=x.pri==='urgente'?'<span class="tag urgente">urgente</span>':'';
    const notes=x.notes?`<div class="card-notes">${x.notes}</div>`:'';
    html+=`<div class="card ${lc} ${x.done?'done':''}">
      <div class="check ${x.done?'on':''}" onclick="toggle(${x.id})">${x.done?'✓':''}</div>
      <div class="card-body">
        <div class="card-title">${x.title}</div>
        <div class="card-meta"><span class="tag ${x.cat}">${x.cat}</span>${pri}${dateHtml}${cli}</div>
        ${notes}
      </div>
      <div class="card-actions">
        <button class="icon-btn edit-btn" onclick="edit(${x.id})" title="Editar">✎</button>
        <button class="icon-btn del-btn" onclick="del(${x.id})" title="Excluir">✕</button>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function toggle(id){const t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;save();render();}}
function del(id){if(confirm('Excluir esta tarefa?')){tasks=tasks.filter(x=>x.id!==id);save();render();}}

function openModal(){
  editId=null;
  document.getElementById('modal-ttl').textContent='Nova tarefa';
  ['f-title','f-notes','f-client'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('f-date').value='';
  document.getElementById('f-cat').value='cliente';
  document.getElementById('f-pri').value='normal';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),300);
}
function edit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editId=id;
  document.getElementById('modal-ttl').textContent='Editar tarefa';
  document.getElementById('f-title').value=t.title;
  document.getElementById('f-notes').value=t.notes||'';
  document.getElementById('f-client').value=t.client||'';
  document.getElementById('f-date').value=t.date||'';
  document.getElementById('f-cat').value=t.cat;
  document.getElementById('f-pri').value=t.pri||'normal';
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
function bgClick(e){if(e.target===document.getElementById('modal-bg'))closeModal();}

function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title)return;
  if(editId){
    const t=tasks.find(x=>x.id===editId);
    if(t){t.title=title;t.notes=document.getElementById('f-notes').value.trim();
      t.cat=document.getElementById('f-cat').value;t.pri=document.getElementById('f-pri').value;
      t.date=document.getElementById('f-date').value;t.client=document.getElementById('f-client').value.trim();}
  } else {
    tasks.push({id:Date.now(),title,notes:document.getElementById('f-notes').value.trim(),
      cat:document.getElementById('f-cat').value,pri:document.getElementById('f-pri').value,
      date:document.getElementById('f-date').value,client:document.getElementById('f-client').value.trim(),done:false});
  }
  save();closeModal();render();
}

document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('[data-f]');if(!b)return;
  filter=b.dataset.f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c===b));
  render();
});

// Toast
function showToast(msg,ms=3000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}

// Notificações
function requestNotif(){
  if(!('Notification' in window)){showToast('Seu navegador não suporta notificações');return;}
  if(Notification.permission==='granted'){scheduleDaily();showToast('✅ Lembretes diários ativados!');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){scheduleDaily();showToast('✅ Lembretes ativados! Você será lembrado às 8h.');}
    else showToast('Permissão negada. Ative nas configurações do Chrome.');
  });
}

function scheduleDaily(){
  localStorage.setItem('notif_enabled','1');
  checkAndNotify();
}

function checkAndNotify(){
  if(Notification.permission!=='granted') return;
  if(!localStorage.getItem('notif_enabled')) return;
  const lastNotif=localStorage.getItem('last_notif_date');
  const todayStr=today();
  if(lastNotif===todayStr) return;
  const over=tasks.filter(x=>!x.done&&daysLate(x.date)>0).length;
  const todayTasks=tasks.filter(x=>!x.done&&dstatus(x.date)==='today').length;
  if(over>0||todayTasks>0){
    const msg=[];
    if(over>0) msg.push(`${over} tarefa${over>1?'s':''} atrasada${over>1?'s':''}`);
    if(todayTasks>0) msg.push(`${todayTasks} para hoje`);
    new Notification('TaskADI — Bom dia!',{
      body:msg.join(' · '),
      icon:'icon-192.png',
      badge:'icon-192.png',
    });
    localStorage.setItem('last_notif_date',todayStr);
  }
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(()=>console.log('SW ok'));
  });
}

load();render();
// Verifica notificação ao abrir o app
setTimeout(checkAndNotify, 1500);
</script>
